<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊計畫 App - 導航精簡版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- SortableJS & VueDraggable -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuedraggable@4.1.0/dist/vuedraggable.umd.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet 地圖 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f0ebe1; color: #4a4036; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        .app-container { box-shadow: 0 0 30px rgba(92, 77, 67, 0.15); background-color: #f9f6f0; }
        .bg-primary { background-color: #6a5a4e; }
        .bg-primary-light { background-color: #8c7a6b; }
        .text-primary { color: #6a5a4e; }
        .sortable-ghost { opacity: 0.4; background-color: #eae5dc; border-radius: 1rem; }
        .sortable-drag { cursor: grabbing !important; }
        .leaflet-top, .leaflet-bottom { z-index: 100 !important; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto h-screen flex flex-col app-container relative overflow-hidden">
        <!-- =============== 介面 HTML 與原本完全相同，省略重複修改以保持版面整潔，你原本的 HTML 結構請保留在此處 =============== -->
        
        <!-- 左側選單 -->
        <div v-if="isSidebarOpen" @click="isSidebarOpen = false" class="fixed inset-0 bg-[#4a4036]/40 z-[500] backdrop-blur-sm transition-opacity"></div>
        <div :class="isSidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed top-0 left-0 h-full w-64 bg-[#f9f6f0] z-[600] transition-transform duration-300 shadow-2xl flex flex-col">
            <div class="p-6 bg-primary text-white">
                <h2 class="text-xl font-bold tracking-widest"><i class="fa-solid fa-suitcase-rolling mr-2"></i>我的旅程</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar">
                <button v-for="trip in trips" :key="trip.id" @click="selectTrip(trip.id)" 
                        class="w-full text-left p-3.5 rounded-2xl border transition-all" 
                        :class="currentTripId === trip.id ? 'border-primary bg-white shadow-md' : 'border-transparent hover:bg-[#eae5dc]'">
                    <div class="font-bold text-[#4a4036] text-sm">{{ trip.name }}</div>
                    <div class="text-[11px] text-[#8c7a6b] mt-1 font-mono">
                        {{ trip.dates[0] }} ➔ {{ trip.dates[trip.dates.length-1] }}
                    </div>
                </button>
            </div>
            <div class="p-4 border-t border-[#e8e2d9]">
                <button @click="openAddTripModal" class="w-full bg-[#eae5dc] text-primary font-bold py-3.5 rounded-2xl hover:bg-[#dcd3cb] active:scale-95 transition-transform text-sm shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> 新增其他旅程
                </button>
            </div>
        </div>

        <!-- Header -->
        <header class="bg-primary text-[#f9f6f0] pt-12 pb-5 px-5 rounded-b-3xl shadow-sm z-20 shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button @click="isSidebarOpen = true" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center text-xl transition-colors">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">{{ currentTrip ? currentTrip.name : '選擇旅程' }}</h1>
                    <p class="text-[#dcd3cb] text-[11px] mt-0.5 font-medium">{{ tabs[currentTab].title }}</p>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto no-scrollbar pb-24 relative flex flex-col" v-if="currentTrip">
            
            <!-- Tab 1: 行程表 -->
            <div v-show="currentTab === 'itinerary'" class="p-5">
                
                <!-- 日期選擇 -->
                <div class="flex overflow-x-auto no-scrollbar mb-5 py-1 gap-2 snap-x">
                    <button v-for="(date, index) in currentTrip.dates" :key="date" 
                            @click="selectedDate = date"
                            class="flex-none px-5 py-2 rounded-2xl text-sm font-bold transition-all shadow-sm flex flex-col items-center justify-center snap-center"
                            :class="selectedDate === date ? 'bg-primary-light text-white scale-105' : 'bg-white text-[#8c7a6b] border border-[#e8e2d9]'">
                        <span class="text-[10px] font-normal mb-0.5 opacity-80">Day {{ index + 1 }}</span>
                        {{ date }}
                    </button>
                </div>

                <!-- 天氣資訊列 -->
                <div v-if="currentDayWeather" class="bg-white/60 border border-[#e8e2d9] rounded-2xl p-3 mb-6 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="text-2xl text-amber-500">
                            <i :class="getWeatherIcon(currentDayWeather.type)"></i>
                        </div>
                        <div>
                            <div class="text-xs font-bold text-[#4a4036]">{{ currentDayWeather.type }}</div>
                            <div class="text-[10px] text-[#8c7a6b]">{{ currentDayWeather.tempLow }}°C - {{ currentDayWeather.tempHigh }}°C</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-blue-500"><i class="fa-solid fa-droplet mr-1"></i>降雨機率</div>
                        <div class="text-xs font-mono font-bold">{{ currentDayWeather.rainChance }}%</div>
                    </div>
                </div>

                <!-- 拖曳時間軸行程清單 -->
                <div class="relative border-l-2 border-[#dcd3cb] ml-3 pb-8 mt-2">
                    <draggable v-model="currentDayItinerary" item-key="id" handle=".drag-handle" ghost-class="sortable-ghost" :animation="200">
                        <template #item="{ element: item }">
                            <div class="relative pl-6 mb-8">
                                <div class="absolute w-4 h-4 bg-primary-light rounded-full -left-[9px] top-1 border-4 border-[#f9f6f0] z-10"></div>
                                
                                <div :class="item.type === 'flight' ? 'bg-primary text-[#f9f6f0] border-2 border-primary-light border-dashed' : 'bg-white border border-[#e8e2d9] text-[#4a4036]'" 
                                     class="p-4 rounded-2xl shadow-sm relative overflow-hidden transition-colors">
                                    
                                    <i v-if="item.type === 'flight'" class="fa-solid fa-plane-departure text-6xl absolute -right-2 -bottom-2 opacity-10"></i>

                                    <div class="flex justify-between items-start mb-1.5 relative z-10">
                                        <div class="flex items-center gap-2">
                                            <span :class="item.type === 'flight' ? 'bg-white/20 px-2 py-0.5 rounded-md text-white' : 'text-primary'" class="font-bold text-sm font-mono tracking-wide">
                                                <i class="fa-regular fa-clock mr-1.5" v-if="item.type !== 'flight'"></i>
                                                <i class="fa-solid fa-plane mr-1.5" v-if="item.type === 'flight'"></i>
                                                {{ item.time }}
                                            </span>
                                            <a v-if="item.googleMapUrl && item.type !== 'flight'" :href="item.googleMapUrl" target="_blank" 
                                               class="w-7 h-7 bg-[#f0ebe1] text-[#6a5a4e] rounded-full flex items-center justify-center hover:bg-[#eae5dc] border border-[#dcd3cb] transition-all active:scale-90 shadow-sm">
                                                <i class="fa-solid fa-location-arrow text-[10px]"></i>
                                            </a>
                                        </div>
                                        <div class="flex space-x-3 items-center">
                                            <button @click="openEditModal(item)" :class="item.type === 'flight' ? 'text-[#dcd3cb] hover:text-white' : 'text-[#bfae9f] hover:text-[#6a5a4e]'"><i class="fa-solid fa-pen text-sm"></i></button>
                                            <button class="drag-handle cursor-grab active:cursor-grabbing px-1" :class="item.type === 'flight' ? 'text-[#dcd3cb]' : 'text-[#bfae9f]'">
                                                <i class="fa-solid fa-grip-lines text-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <h3 class="font-bold text-lg relative z-10 mt-1">{{ item.title }}</h3>
                                    
                                    <div v-if="item.type === 'flight' && item.flightNo" class="inline-block mt-2 bg-white/20 text-white text-xs px-2.5 py-1 rounded-md font-mono relative z-10 border border-white/30">
                                        <i class="fa-solid fa-ticket mr-1"></i> {{ item.flightNo }}
                                    </div>

                                    <p v-if="item.remark" :class="item.type === 'flight' ? 'bg-black/20 text-[#e8e2d9]' : 'bg-[#f9f6f0] text-[#8c7a6b]'" class="text-[11px] mt-3 p-2.5 rounded-xl font-medium relative z-10">
                                        <i class="fa-solid fa-tag mr-1 opacity-70"></i> {{ item.remark }}
                                    </p>
                                </div>

                                <div v-if="item.transitToNext" class="absolute -bottom-6 -left-[12px] flex items-center z-10">
                                    <div class="bg-[#f9f6f0] border-2 border-[#dcd3cb] w-6 h-6 rounded-full flex items-center justify-center text-[10px] text-[#8c7a6b]">
                                        <i class="fa-solid fa-arrow-down"></i>
                                    </div>
                                    <span class="ml-2 text-[11px] font-bold text-[#6a5a4e] bg-[#eae5dc] border border-[#dcd3cb] px-2.5 py-1 rounded-lg shadow-sm">
                                        <i class="fa-solid fa-shoe-prints mr-1"></i>{{ item.transitToNext }}
                                    </span>
                                </div>
                            </div>
                        </template>
                    </draggable>

                    <div v-if="currentDayItinerary.length === 0" class="pl-6 py-10 text-center text-[#8c7a6b]">
                        <i class="fa-regular fa-calendar-plus text-3xl mb-2 opacity-50"></i>
                        <p class="text-sm font-medium">本日尚未安排行程</p>
                    </div>
                </div>

                <button @click="openAddModal" class="fixed bottom-20 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-primary-light transition-transform active:scale-95 z-30">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <!-- Tab 2: 地圖導航 -->
            <div v-show="currentTab === 'map'" class="flex-1 w-full flex flex-col relative bg-[#f9f6f0]">
                <div id="leaflet-map" class="w-full h-full z-0 absolute inset-0"></div>
                <div class="absolute top-4 left-4 right-4 bg-white/90 backdrop-blur-md p-3.5 rounded-2xl shadow-lg z-[400] border border-[#e8e2d9]">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="font-bold text-[#4a4036] text-sm"><i class="fa-solid fa-location-dot text-primary mr-2"></i>Day {{ currentTrip.dates.indexOf(selectedDate) + 1 }} 行程地圖</h3>
                        <button @click="locateUser" class="bg-primary text-white text-xs px-3 py-1.5 rounded-lg shadow-sm active:scale-95 flex items-center gap-1 transition-transform">
                            <i class="fa-solid fa-crosshairs"></i> 定位
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tab 3: 分帳系統 -->
            <div v-show="currentTab === 'split'" class="p-5 space-y-6">
                <!-- ...(你原本的分帳 HTML 內容，保持不變)... -->
                <div class="bg-[#eae5dc] rounded-2xl p-4 flex justify-between items-center shadow-sm border border-[#dcd3cb]">
                    <div class="flex items-center gap-2 text-[#4a4036] font-bold text-sm">
                        <i class="fa-solid fa-money-bill-trend-up text-primary text-lg"></i><span>設定匯率</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input v-model.number="currentTrip.exchangeRate" type="number" step="0.0001" class="w-20 bg-white border border-[#dcd3cb] rounded-lg px-2 py-1 text-sm font-mono text-center focus:outline-none">
                    </div>
                </div>
                <!-- ...略... -->
            </div>
        </main>

        <!-- Bottom Navigation & Modals 保持不變 -->
        <!-- ...(這部分同你原本 HTML，保持不變)... -->
    </div>

    <!-- 🌟 注意這裡：將 script 改為 type="module" -->
    <script type="module">
        // ==========================================
        // 1. Firebase 初始化設定 (使用 CDN 模組載入)
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        // 如果未來你需要使用資料庫，可以在下方引入 Firestore (請取消註解)
        // import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf6r7yKD-KQalD66MAfCQ52kGldaB_aw0",
            authDomain: "tripapp-49bb0.firebaseapp.com",
            projectId: "tripapp-49bb0",
            storageBucket: "tripapp-49bb0.firebasestorage.app",
            messagingSenderId: "311178829456",
            appId: "1:311178829456:web:6024956cd4aa7107d28215",
            measurementId: "G-878K99280Z"
        };

        // 為避免跟 Vue 的 app 變數衝突，將這裡命名為 firebaseApp
        const firebaseApp = initializeApp(firebaseConfig);
        const analytics = getAnalytics(firebaseApp);
        // 如果要宣告資料庫實體： const db = getFirestore(firebaseApp);

        // ==========================================
        // 2. 原本的 Vue 3 程式碼 
        // ==========================================
        const { createApp, ref, computed, reactive, watch, nextTick } = window.Vue; // 加上 window. 指定全域

        const app = createApp({
            setup() {
                const currentTab = ref('itinerary');
                const isSidebarOpen = ref(false);
                const tabs = {
                    itinerary: { label: '行程', title: '行程與機票', icon: 'fa-regular fa-calendar-check' },
                    map: { label: '地圖', title: '周邊地圖', icon: 'fa-solid fa-map-location-dot' },
                    split: { label: '分帳', title: '記帳本', icon: 'fa-solid fa-coins' }
                };

                const trips = ref([
                    {
                        id: 1, name: '2026 釜山之旅 🇰🇷', dates:['5/13', '5/14', '5/15', '5/16', '5/17'], exchangeRate: 0.0235, people:['自己', '旅伴A', '旅伴B'], expenses:[],
                        weather: {
                            '5/13': { type: '晴時多雲', tempLow: 18, tempHigh: 24, rainChance: 10 },
                            '5/14': { type: '晴朗', tempLow: 20, tempHigh: 26, rainChance: 0 },
                            '5/15': { type: '短暫雨', tempLow: 17, tempHigh: 22, rainChance: 60 },
                            '5/16': { type: '陰天', tempLow: 16, tempHigh: 21, rainChance: 30 },
                            '5/17': { type: '晴天', tempLow: 19, tempHigh: 25, rainChance: 5 },
                        },
                        itinerary:[
                            { id: 1, date: '5/13', time: '06:10', type: 'flight', title: 'TPE ➔ PUS', flightNo: 'BX794', remark: '填K-ETA', lat: 35.1732, lng: 128.9463, transitToNext: '快線 45m', order: 0 },
                            { id: 2, date: '5/13', time: '08:00', type: 'normal', title: '寄放行李', remark: '西面站附近', googleMapUrl: 'https://www.google.com/maps/place/釜山/@35.1524,129.0596,15z', lat: 35.1524, lng: 129.0596, transitToNext: '車程 30m', order: 1 },
                            { id: 3, date: '5/13', time: '10:00', type: 'normal', title: 'SPA LAND', remark: 'Centum City', googleMapUrl: 'https://www.google.com/maps/place/SPA+LAND/@35.1689,129.1298,15z', lat: 35.1689, lng: 129.1298, transitToNext: '', order: 2 },
                        ]
                    }
                ]);
                
                const currentTripId = ref(1);
                const currentTrip = computed(() => trips.value.find(t => t.id === currentTripId.value));
                const selectedDate = ref('5/13');

                const currentDayWeather = computed(() => {
                    if (!currentTrip.value || !currentTrip.value.weather) return null;
                    return currentTrip.value.weather[selectedDate.value] || { type: '未知', tempLow: '--', tempHigh: '--', rainChance: 0 };
                });

                const getWeatherIcon = (type) => {
                    if (type.includes('雨')) return 'fa-solid fa-cloud-showers-heavy';
                    if (type.includes('雲') || type.includes('陰')) return 'fa-solid fa-cloud-sun';
                    return 'fa-solid fa-sun';
                };

                const selectTrip = (id) => {
                    currentTripId.value = id;
                    selectedDate.value = currentTrip.value.dates[0];
                    isSidebarOpen.value = false;
                };

                const isAddTripModalOpen = ref(false);
                const newTripForm = reactive({ name: '', startDate: '', endDate: '' });
                const openAddTripModal = () => { newTripForm.name = ''; newTripForm.startDate = ''; newTripForm.endDate = ''; isAddTripModalOpen.value = true; };
                const createNewTrip = () => {
                    if (!newTripForm.name || !newTripForm.startDate || !newTripForm.endDate) return alert('請填寫完整資訊');
                    let dates =[]; let curr = new Date(newTripForm.startDate); let end = new Date(newTripForm.endDate);
                    let weather = {};
                    while(curr <= end) { 
                        const dStr = `${curr.getMonth()+1}/${curr.getDate()}`;
                        dates.push(dStr); 
                        weather[dStr] = { type: '晴天', tempLow: 22, tempHigh: 28, rainChance: 10 }; 
                        curr.setDate(curr.getDate() + 1); 
                    }
                    const newId = Date.now();
                    trips.value.push({ id: newId, name: newTripForm.name, dates: dates, exchangeRate: 1, people:['自己', '旅伴A'], expenses:[], itinerary:[], weather: weather });
                    selectTrip(newId); isAddTripModalOpen.value = false;
                };

                const currentDayItinerary = computed({
                    get() {
                        if (!currentTrip.value) return[];
                        return currentTrip.value.itinerary.filter(i => i.date === selectedDate.value).sort((a, b) => a.order - b.order);
                    },
                    set(newList) {
                        newList.forEach((item, index) => { item.order = index; });
                        const otherDays = currentTrip.value.itinerary.filter(i => i.date !== selectedDate.value);
                        currentTrip.value.itinerary =[...otherDays, ...newList];
                    }
                });

                const isModalOpen = ref(false);
                const modalMode = ref('add'); 
                const form = reactive({ id: null, date: '', time: '', type: 'normal', title: '', flightNo: '', googleMapUrl: '', lat: null, lng: null, remark: '', transitToNext: '' });

                watch(() => form.googleMapUrl, (newUrl) => {
                    if (newUrl) {
                        const match = newUrl.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                        if (match) { form.lat = parseFloat(match[1]); form.lng = parseFloat(match[2]); }
                    }
                });

                const openAddModal = () => {
                    modalMode.value = 'add';
                    Object.assign(form, { id: Date.now(), date: selectedDate.value, time: '', type: 'normal', title: '', flightNo: '', googleMapUrl: '', lat: null, lng: null, remark: '', transitToNext: '' });
                    isModalOpen.value = true;
                };
                const openEditModal = (item) => { modalMode.value = 'edit'; Object.assign(form, item); isModalOpen.value = true; };
                const closeModal = () => { isModalOpen.value = false; };
                
                const saveItinerary = () => {
                    if(!form.title || !form.time) return alert('請填寫時間與標題');
                    if (modalMode.value === 'add') {
                        form.order = currentDayItinerary.value.length;
                        currentTrip.value.itinerary.push({ ...form });
                    } else {
                        const index = currentTrip.value.itinerary.findIndex(i => i.id === form.id);
                        if (index !== -1) currentTrip.value.itinerary[index] = { ...form };
                    }
                    if (currentTab.value === 'map') updateMapMarkers();
                    closeModal();
                };
                const deleteItinerary = (id) => {
                    if(confirm("確定要刪除嗎？")) { currentTrip.value.itinerary = currentTrip.value.itinerary.filter(i => i.id !== id); closeModal(); }
                };

                let mapInstance = null;
                let markersGroup = null;
                let userMarker = null;

                const initMap = () => {
                    if (mapInstance) return;
                    mapInstance = L.map('leaflet-map', { zoomControl: false }).setView([35.1524, 129.0596], 12);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OSM'
                    }).addTo(mapInstance);
                    markersGroup = L.layerGroup().addTo(mapInstance);
                };

                const updateMapMarkers = () => {
                    if (!markersGroup || !mapInstance) return;
                    markersGroup.clearLayers();
                    const bounds =[];
                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background-color:#6a5a4e; color:white; width:26px; height:26px; border-radius:50%; display:flex; justify-content:center; align-items:center; border:2px solid white; box-shadow:0 3px 6px rgba(0,0,0,0.3);"><i class="fa-solid fa-location-dot" style="font-size:10px;"></i></div>`,
                        iconSize: [26, 26], iconAnchor:[13, 13]
                    });
                    currentDayItinerary.value.forEach(item => {
                        if (item.lat && item.lng) {
                            const marker = L.marker([item.lat, item.lng], { icon: customIcon }).addTo(markersGroup);
                            marker.bindPopup(`<b style="color:#6a5a4e;">${item.time}</b><br>${item.title}`);
                            bounds.push([item.lat, item.lng]);
                        }
                    });
                    if (bounds.length > 0) mapInstance.fitBounds(bounds, { padding:[50, 50], maxZoom: 15 });
                };

                const locateUser = () => {
                    if (!mapInstance) return;
                    navigator.geolocation.getCurrentPosition(position => {
                        const { latitude, longitude } = position.coords;
                        if (userMarker) userMarker.setLatLng([latitude, longitude]);
                        else userMarker = L.circleMarker([latitude, longitude], { color: '#fff', fillColor: '#3b82f6', fillOpacity: 1, radius: 8 }).addTo(mapInstance);
                        mapInstance.setView([latitude, longitude], 14);
                    });
                };

                watch(currentTab, async (newTab) => {
                    if (newTab === 'map') {
                        await nextTick();
                        initMap();
                        mapInstance.invalidateSize();
                        updateMapMarkers();
                    }
                });

                const newExpense = reactive({ item: '', amount: null, paidBy: '' });
                const addExpense = () => {
                    if(!newExpense.item || !newExpense.amount || !newExpense.paidBy) return;
                    currentTrip.value.expenses.push({ id: Date.now(), ...newExpense });
                    newExpense.item = ''; newExpense.amount = null; newExpense.paidBy = '';
                };
                const deleteExpense = (id) => { currentTrip.value.expenses = currentTrip.value.expenses.filter(e => e.id !== id); };

                const settlements = computed(() => {
                    if (!currentTrip.value) return[];
                    const balances = {};
                    currentTrip.value.people.forEach(p => balances[p] = 0);
                    currentTrip.value.expenses.forEach(exp => {
                        balances[exp.paidBy] += exp.amount;
                        const split = exp.amount / currentTrip.value.people.length;
                        currentTrip.value.people.forEach(p => balances[p] -= split);
                    });
                    let debtors =[], creditors =[];
                    for (const[p, b] of Object.entries(balances)) {
                        if (b < -1) debtors.push({ p, b: Math.abs(b) }); else if (b > 1) creditors.push({ p, b });
                    }
                    const res =[]; let di=0, ci=0;
                    while(di<debtors.length && ci<creditors.length){
                        let amt = Math.min(debtors[di].b, creditors[ci].b);
                        res.push({ from: debtors[di].p, to: creditors[ci].p, amount: Math.round(amt) });
                        debtors[di].b -= amt; creditors[ci].b -= amt;
                        if(debtors[di].b < 1) di++; if(creditors[ci].b < 1) ci++;
                    }
                    return res;
                });

                return {
                    currentTab, tabs, isSidebarOpen, trips, currentTripId, currentTrip, selectTrip,
                    isAddTripModalOpen, newTripForm, openAddTripModal, createNewTrip, selectedDate,
                    currentDayItinerary, isModalOpen, modalMode, form, openAddModal, openEditModal, closeModal, saveItinerary, deleteItinerary,
                    locateUser, newExpense, addExpense, deleteExpense, settlements,
                    currentDayWeather, getWeatherIcon
                };
            }
        });

        // 掛載拖曳套件與 Vue
        app.component('draggable', window.vuedraggable);
        app.mount('#app');
    </script>
</body>
